    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: #1a335e;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 0;
        }

        /* Main container */
        .container {
            width: 390px;
            height: 770px;
            background: #022663;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.128);
            overflow: hidden;
            margin-bottom: 0;
            gap: 12px;
            padding-top: 12px;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .right-icons {
            display: flex;
            gap: 8px;
        }

        .icon-circle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.822);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-circle img {
            width: 110%;
            height: 110%;
            object-fit: contain;
        }

        .icon-circle:hover {
            background: rgb(255, 255, 255);
            transform: scale(1.1);
        }

        /* Profile */
        .profile {
            text-align: center;
            margin-top: 4px;
        }

        .logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 10px;

            display: flex;
            justify-content: center;
            align-items: center;

            background: transparent;
        }

        .logo img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .profile h2 {
            font-size: 16px;
            color: white;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .profile p {
            font-size: 9.7px;
            color: white;
            font-weight: 400;
        }

        /* Links */
        .links {
            margin-top: 4px;
        }

        .links a {
            position: relative;
            display: flex;
            align-items: center;
            color: white;
            border: 0.7px solid rgb(255, 255, 255);
            padding: 6.5px 15px;
            padding-left: 4px;
            padding-right: 14px;
            margin: 9px 0;
            font-size: 9.75px;
            font-weight: 400;
        }

        .links a span {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .links a i {
            margin-left: auto;
            opacity: 0.5;
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .link-leftside {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-start;
        }

        .link-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .link-leftside span {
            text-align: left;
        }

        .links a:hover {
            background: #1a3d73;
        }

        .links span i {
            margin-right: 8px;
        }

        /* Bottom button */
        .join-btn {
            display: inline-block;
            margin: 10px auto 0;
            background: white;
            color: black;
            padding: 9.75px 12px;
            text-align: center;
            border-radius: 20px;
            font-size: 10.5px;
            font-weight: 600;
            margin-top: 28px;
            margin-bottom: 0px;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 6.75px;
            color: white;
            margin-top: 10px;
            font-weight: 400;
        }
    </style>
</head>
